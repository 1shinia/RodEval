<!-- ── Header ──────────────────────────────────────────────── -->
<header class="report-header">
  <div class="header-inner">
    <div class="header-eyebrow">
      <!-- Language toggle: EN / 中文 -->
      <div class="lang-switcher" role="group" aria-label="Language selection">
        <button class="lang-btn{% if default_lang == 'en' %} active{% endif %}" data-lang="en">EN</button>
        <button class="lang-btn{% if default_lang == 'zh' %} active{% endif %}" data-lang="zh">中文</button>
      </div>
    </div>
    <h1 class="report-title" data-i18n="header.title">Evaluation Report</h1>
    <div class="meta-chips">
      <div class="meta-chip">
        <span class="meta-chip-label" data-i18n="meta.models">Model(s)</span>
        <span class="meta-chip-value" title="{{ models | join(', ') if models else 'N/A' }}">{{ models | join(", ") if models else "N/A" }}</span>
      </div>
      <div class="meta-chip">
        <span class="meta-chip-label" data-i18n="meta.datasets">Datasets</span>
        <span class="meta-chip-value" title="{{ datasets | join(', ') if datasets else 'N/A' }}">{{ datasets | join(", ") if datasets else "N/A" }}</span>
      </div>
      <div class="meta-chip">
        <span class="meta-chip-label" data-i18n="meta.generated_at">Generated at</span>
        <span class="meta-chip-value">{{ generated_at }}</span>
      </div>
    </div>
  </div>
</header>
